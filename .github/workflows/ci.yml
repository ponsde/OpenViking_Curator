name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest mypy types-requests
      - name: Type check
        run: |
          mypy curator/ --ignore-missing-imports --exclude curator/legacy/
      - name: Run tests
        env:
          CURATOR_OAI_BASE: http://localhost:8000/v1
          CURATOR_OAI_KEY: test-key
          CURATOR_GROK_KEY: test-key
        run: |
          pytest tests/ -q
      - name: Run smoke minimal
        env:
          CURATOR_OAI_BASE: http://localhost:8000/v1
          CURATOR_OAI_KEY: test-key
          CURATOR_GROK_KEY: test-key
          CURATOR_LLM_ROUTE: "0"
        run: |
          bash scripts/smoke_minimal.sh
